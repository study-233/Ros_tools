<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta charset="UTF-8">
  <title>房间板子放置工具 (10x4)</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-color: #f2f2f2;
      font-family: sans-serif;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 95vw; /* 10列较宽，增加显示宽度 */
      max-width: 800px; 
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr); /* 修改为10列 */
      grid-template-rows: repeat(4, 1fr);    /* 修改为4行 */
      gap: 4px;
      width: 100%;
      aspect-ratio: 10 / 4; /* 宽高比改为10:4 */
      margin-bottom: 20px;
    }

    .cell {
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid #999;
      background-color: #f0f0f0;
      font-size: 1.5vw; 
      min-height: 40px;
    }

    /* 状态颜色 */
    .excluded { background-color: #999; color: white; }
    .selected { background-color: #4caf50; color: white; font-weight: bold; }
    .obstacle { background-color: #e53935; color: white; font-weight: bold; }
    .target   { background-color: #ffeb3b; color: black; font-weight: bold; border: 2px solid #000; }

    button {
      margin: 5px;
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #2196F3;
      color: white;
      transition: background 0.3s;
    }

    button:hover { background-color: #1976D2; }
    button.reset { background-color: #757575; }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="container">
      <h2>房间板子放置工具 (10x4)</h2>
      <div class="grid" id="grid"></div>
      <div>
        <button onclick="placeRecognition()">放置三个识别板</button>
        <button onclick="placeBoth()">放置识别板和障碍板</button>
        <button class="reset" onclick="resetGrid()">重置</button>
      </div>
    </div>
  </div>

  <script>
    // 配置参数
    const cols = 10;
    const rows = 4;
    // 更新不可放置的坐标
    const excluded = ['3,4', '1,5', '1,6']; 

    function createGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      // 循环生成格子，从最高行往下排
      for (let r = rows; r >= 1; r--) {
        for (let c = 1; c <= cols; c++) {
          const cell = document.createElement('div');
          cell.classList.add('cell');
          const id = `${c},${r}`;
          cell.id = id;
          cell.textContent = id;
          
          if (excluded.includes(id)) {
            cell.classList.add('excluded');
          }
          grid.appendChild(cell);
        }
      }
    }

    function resetGrid() {
      document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('selected', 'obstacle', 'target');
      });
    }

    function getAvailableCells() {
      const all = [];
      for (let r = 1; r <= rows; r++) {
        for (let c = 1; c <= cols; c++) {
          const id = `${c},${r}`;
          const cell = document.getElementById(id);
          if (!excluded.includes(id) && 
              !cell.classList.contains('selected') && 
              !cell.classList.contains('obstacle')) {
            all.push(id);
          }
        }
      }
      return all;
    }

    function getRandomCells(count, pool) {
      const result = [];
      while (result.length < count && pool.length > 0) {
        const index = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(index, 1)[0]);
      }
      return result;
    }

    function placeRecognition() {
      resetGrid();
      const pool = getAvailableCells();
      const selected = getRandomCells(3, pool);

      const targetIndex = Math.floor(Math.random() * selected.length);
      selected.forEach((id, index) => {
        const cell = document.getElementById(id);
        cell.classList.add('selected');
        if (index === targetIndex) {
          cell.classList.add('target');
        }
      });
    }

    function placeBoth() {
      resetGrid();
      // 1. 先放识别板
      let pool = getAvailableCells();
      const selected = getRandomCells(3, pool);
      const targetIndex = Math.floor(Math.random() * selected.length);
      
      selected.forEach((id, index) => {
        const cell = document.getElementById(id);
        cell.classList.add('selected');
        if (index === targetIndex) {
          cell.classList.add('target');
        }
      });

      // 2. 再从剩下的格子里选障碍板
      pool = getAvailableCells(); 
      const obstacles = getRandomCells(3, pool);
      obstacles.forEach(id => {
        const cell = document.getElementById(id);
        cell.classList.add('obstacle');
      });
    }

    // 初始化
    createGrid();
  </script>

</body>
</html>
